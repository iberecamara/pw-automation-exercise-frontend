name: Vanilla Playwright Test Automation Framework for Automation Exercise frontend
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
permissions:
  contents: read
env:
  APPLICATION: Automation Exercise
  WORKERS: 4
  LOG_LINE_LENGTH: 100
  HEADLESS: true
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps
      - name: Run Playwright tests
        run: npm run test
      - name: Generate single file Allure Report
        run: npm run report:export
      - name: Upload Allure Report
        uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: Allure Report
          path: artifacts/reports/allure/allure-report-single
          retention-days: 30
          overwrite: true
      - name: Upload logs
        uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: Automation Logs
          path: artifacts/logs/
          retention-days: 30
